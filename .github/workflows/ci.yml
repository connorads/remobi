name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      # node-pty stable does not ship Linux prebuilds, so CI must support source builds.
      - name: Verify native build prerequisites
        run: |
          python3 --version
          node-gyp --version
      - run: pnpm install
      - run: pnpm exec playwright install --with-deps chromium webkit
      - run: pnpm test
      - run: pnpm run build:dist
      - run: pnpm run test:pw
      - run: pnpm run check
      - run: pnpm run lint:ox
      - run: pnpm run lint:typos
      - run: pnpm run lint:knip
      - run: pnpm run lint:publint
      - run: pnpm exec tsc --noEmit

  release:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v3
      - name: Verify native build prerequisites
        run: |
          python3 --version
          node-gyp --version
      - run: pnpm install
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
