name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
      - run: bun install
      - run: bun test
      - name: Validate build pipeline (inject mode, no ttyd needed)
        run: echo '<html><head></head><body></body></html>' | bun run cli.ts inject > /dev/null
      - run: bun run check
      - run: bun run lint:ox
      - run: bun run lint:typos
      - run: bun run lint:knip
      - run: bun run lint:publint
      - run: bunx tsc --noEmit
